<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="container">
        <div class="map-title">Accessiblity to basic services</div>
        <div id="dropdown-container">
            <div id="dropdown-label">Select:</div>
            <select class="select-map" id="service">
                <option value="healthcare" selected>Healthcare</option>
                <option value="education">Education</option>
                <option value="evrp">Electric vehicle recharging points</option>
            </select>
            <select class="select-map" id="time">
                <option value="2023" selected>2023</option>
                <option value="2020">2020</option>
            </select>
            <select class="select-map" id="indic">
                <option value="LT_5_MIN" selected>Less than 5 min</option>
                <option value="LT_20_MIN">Less than 20 min</option>
                <option value="LT_45_MIN">Less than 45 min</option>
            </select>
            <select class="select-map" id="nuts_lvl">
                <option value="3" selected>3</option>
                <option value="2">2</option>
                <option value="1">1</option>
                <option value="0">0</option>
            </select>
        </div>
        <div id="map-container">
            <svg id="map" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
    </div>

    <script src="./eurostatmap.min.js"></script>
    <script type="module" src="./ch-map.js"></script>
</body>

</html>
