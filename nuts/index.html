<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="container">
        <div class="map-title">Accessiblity to basic services</div>
        <div id="dropdown-container">
            <div id="dropdown-label">Select:</div>
            <ewc-singleselect id="service"
                options='[    [    { "name": "Healthcare", "code": "healthcare", "status": "active" }, { "name": "Education", "code":"education", "status": "active" }    ]  ]'
                defaultOption="healthcare" activeOption="healthcare" dropdownHeight="200px" selectedLabel="Select below"
                invertColors="false" searchMode=""></ewc-singleselect>
            <ewc-singleselect id="time"
                options='[    [    { "name": "2020", "code": "2020", "status": "active" }, { "name": "2023", "code":"2023", "status": "active" }]]'
                defaultOption="2023" activeOption="2023" dropdownHeight="200px" selectedLabel="Select below"
                invertColors="false" searchMode=""></ewc-singleselect>
            <ewc-singleselect id="indic"
                options='[    [ { "name": "LT_5_MIN", "code": "LT_5_MIN", "status": "active" }, { "name": "LT_20_MIN", "code":"LT_20_MIN", "status": "active" }, { "name": "LT_45_MIN", "code":"LT_45_MIN", "status": "active" }]]'
                defaultOption="LT_5_MIN" activeOption="LT_5_MIN" dropdownHeight="200px" selectedLabel="Select below"
                invertColors="false" searchMode=""></ewc-singleselect>
            <ewc-singleselect id="nuts_lvl"
                options='[    [    { "name": "0", "code": "0", "status": "active" }, { "name": "1", "code":"1", "status": "active" } , { "name": "2", "code":"2", "status": "active" }, { "name": "3", "code":"3", "status": "active" }   ]  ]'
                defaultOption="3" activeOption="3" dropdownHeight="200px" selectedLabel="Select below"
                invertColors="false" searchMode=""></ewc-singleselect>
        </div>
        <div id="map-container">
            <svg id="map" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
    </div>

    <script src="./eurostatmap.min.js"></script>
    <script type="module" src="./ch-map.js"></script>
</body>

</html>
