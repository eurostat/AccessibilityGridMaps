<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div id="container">
      <div class="map-title">Accessiblity to basic services</div>
      <div class="dropdown-container">
        Service type:
        <select class="select-map" id="service">
          <option value="healthcare" selected>Healthcare service</option>
          <option value="education">Education service</option>
          <option value="evrp">Electric vehicle recharging points</option>
        </select>
      </div>
      <div class="dropdown-container sentence-controls">
        This map shows the
        <select class="select-map" id="unit">
          <option value="PC" selected>share of</option>
          <option value="NR">total</option>
        </select>
        population with
        <select class="select-map" id="age">
          <option value="T" selected>all ages</option>
          <option value="Y_LT15">age less than 15</option>
          <option value="Y_1564">age from 15 to 64</option>
          <option value="Y_GE65">age greater than 65</option>
        </select>
        living in
        <select class="select-map" id="degurba">
          <option value="TOTAL" selected>both urban and rural areas</option>
          <option value="DEG1">cities</option>
          <option value="DEG2">towns and suburbs</option>
          <option value="DEG3">rural areas</option>
        </select>
        and within
        <select class="select-map" id="threshold"></select>
        <select class="select-map" id="indic"></select>
        in
        <select class="select-map" id="time"></select>
      </div>
      <div class="dropdown-container">
        By NUTS
        <select class="select-map" id="nuts_lvl">
          <option value="3" selected>3</option>
          <option value="2">2</option>
          <option value="1">1</option>
          <option value="0">0</option>
        </select>
        regions
      </div>

      <div id="map-container">
        <svg id="map"></svg>
      </div>
    </div>

    <script src="./eurostatmap.min.js"></script>
    <script type="module" src="./map.js"></script>
  </body>
</html>
